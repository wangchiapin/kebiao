  .arrow-col{display:none}
  .cards{grid-template-columns:repeat(2,1fr)}

<script>
// ── Firebase ──
const firebaseConfig={
  apiKey:"AIzaSyD931NXk1WUR-No5RJRav4HPZ4rqQNfxj4",
  authDomain:"huayu-schedule.firebaseapp.com",
  projectId:"huayu-schedule",
  storageBucket:"huayu-schedule.firebasestorage.app",
  messagingSenderId:"921832358090",
  appId:"1:921832358090:web:1194e7f49aca55907bb433"
};
firebase.initializeApp(firebaseConfig);
firebase.auth().signInAnonymously().catch(e=>console.error(e));
const db=firebase.firestore();
const docRef=db.collection("appData").doc("scheduleMain");

// ── 常數 ──
const DAYS=['一','二','三','四','五','六','日']; // 0=週一 … 6=週日
// 台灣課表：07:00–22:00
const TW_HOURS=[];for(let h=7;h<22;h++)TW_HOURS.push(h);
// 對照課表：顯示 15 格，以換算後時間為中心（00–23 全覆蓋用，渲染時過濾）
const OT_HOURS=[];for(let h=0;h<24;h++)OT_HOURS.push(h);
const MONTHLY_MULT=4;

const TZ_LIST=[
  {name:'── 拉丁美洲 ──',tz:null,disabled:true},
  {name:'墨西哥 墨西哥城',tz:'America/Mexico_City'},
  {name:'秘魯 利馬',tz:'America/Lima'},
  {name:'智利 聖地牙哥',tz:'America/Santiago'},
  {name:'瓜地馬拉',tz:'America/Guatemala'},
  {name:'哥斯大黎加',tz:'America/Costa_Rica'},
  {name:'巴拿馬',tz:'America/Panama'},
  {name:'古巴 哈瓦那',tz:'America/Havana'},
  {name:'波多黎各',tz:'America/Puerto_Rico'},
  {name:'哥倫比亞 波哥大',tz:'America/Bogota'},
  {name:'厄瓜多 基多',tz:'America/Guayaquil'},
  {name:'委內瑞拉 卡拉卡斯',tz:'America/Caracas'},
  {name:'玻利維亞 拉巴斯',tz:'America/La_Paz'},
  {name:'阿根廷 布宜諾斯艾利斯',tz:'America/Argentina/Buenos_Aires'},
  {name:'巴西 聖保羅',tz:'America/Sao_Paulo'},
  {name:'巴西 馬瑙斯',tz:'America/Manaus'},
  {name:'烏拉圭 蒙特維多',tz:'America/Montevideo'},
  {name:'巴拉圭 亞松森',tz:'America/Asuncion'},
  {name:'── 美加 ──',tz:null,disabled:true},
  {name:'美國 紐約（東部）',tz:'America/New_York'},
  {name:'美國 芝加哥（中部）',tz:'America/Chicago'},
  {name:'美國 丹佛（山地）',tz:'America/Denver'},
  {name:'美國 洛杉磯（西部）',tz:'America/Los_Angeles'},
  {name:'美國 鳳凰城（山地無夏令）',tz:'America/Phoenix'},
  {name:'美國 安克拉治（阿拉斯加）',tz:'America/Anchorage'},
  {name:'美國 檀香山（夏威夷）',tz:'Pacific/Honolulu'},
  {name:'加拿大 多倫多',tz:'America/Toronto'},
  {name:'加拿大 溫哥華',tz:'America/Vancouver'},
  {name:'加拿大 溫尼伯',tz:'America/Winnipeg'},
  {name:'── 歐洲 ──',tz:null,disabled:true},
  {name:'西班牙 馬德里',tz:'Europe/Madrid'},
];

const COLORS={
  blue:{bg:'#E6F1FB',text:'#0C447C'},teal:{bg:'#E1F5EE',text:'#085041'},
  purple:{bg:'#EEEDFE',text:'#3C3489'},coral:{bg:'#FAECE7',text:'#712B13'},
  green:{bg:'#EAF3DE',text:'#27500A'},amber:{bg:'#FAEEDA',text:'#633806'},
  pink:{bg:'#FBEAF0',text:'#72243E'},
};
const COLOR_KEYS=Object.keys(COLORS);

let schedule={},rates={},currentTZ=null,diffMin=0,currentCell=null,saveTimer=null;

// ── 正確的時區偏移計算 ──
function getUTCOffsetMin(tz){
  try{
    const base=new Date(2026,3,29,12,0,0);
    const utcStr=base.toLocaleString('en-US',{timeZone:'UTC',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false});
    const tzStr=base.toLocaleString('en-US',{timeZone:tz,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false});
    const parseLS=s=>{
      const[date,time]=s.split(', ');
      const[m,d,y]=date.split('/').map(Number);
      const[h,mn]=time.split(':').map(Number);
      return new Date(y,m-1,d,h,mn).getTime();
    };
    return Math.round((parseLS(tzStr)-parseLS(utcStr))/60000);
  }catch(e){return 0;}
}

function computeDiff(tz){
  const TW_OFF=getUTCOffsetMin('Asia/Taipei'); 
  return getUTCOffsetMin(tz)-TW_OFF;
}

function getTZLabel(tz){
  const off=getUTCOffsetMin(tz);
  const sign=off>=0?'+':'-';const a=Math.abs(off);
  return 'GMT'+sign+Math.floor(a/60)+(a%60?':'+String(a%60).padStart(2,'0'):'');
}

function twToOt(di,h){
  const twTotal=di*1440+h*60;
  const otTotal=twTotal+diffMin;
  const WEEK=7*1440; 
  let otDi=Math.floor(((otTotal%WEEK)+WEEK)%WEEK/1440);
  const otMinInDay=((otTotal%1440)+1440)%1440;
  const otH=Math.floor(otMinInDay/60);
  return{di:otDi,h:otH};
}

function getOTDisplayHours(){
  const otHours=new Set();
  Object.keys(schedule).forEach(key=>{
    const entry=schedule[key];
    if(!entry||!entry.name)return;
    const[h,di]=key.split('_').map(Number);
    const{h:otH}=twToOt(di,h);
    otHours.add(otH);
  });
  if(otHours.size===0){
    const{h:minH}=twToOt(0,7);
    const startH=(minH+24)%24;
    const hours=[];
    for(let i=0;i<15;i++) hours.push((startH+i)%24);
    return hours;
  }
  const minH=Math.min(...otHours);
  const maxH=Math.max(...otHours);
  const start=Math.max(0,minH-2);
  const end=Math.min(23,maxH+2);
  const hours=[];
  for(let h=start;h<=end;h++) hours.push(h);
  while(hours.length<15&&hours[0]>0) hours.unshift(hours[0]-1);
  while(hours.length<15&&hours[hours.length-1]<23) hours.push(hours[hours.length-1]+1);
  return hours;
}

// ── Firebase 儲存 ──
function saveData(){
  setSaveStatus('saving');
  docRef.set({schedule,rates,updatedAt:firebase.firestore.FieldValue.serverTimestamp()})
    .then(()=>setSaveStatus('saved'))
    .catch(e=>{console.error(e);setSaveStatus('error');});
}
function listenCloudData(){
  docRef.onSnapshot(doc=>{
    if(doc.exists){const d=doc.data();if(d.schedule)schedule=d.schedule;if(d.rates)rates=d.rates;setSaveStatus('saved');renderSched();}
    else{setSaveStatus('saved');renderSched();}
  },err=>{console.error(err);setSaveStatus('error');});
}
function setSaveStatus(s){
  const el=document.getElementById('save-status');if(!el)return;
  if(s==='saving'){el.textContent='⏳ 雲端同步中...';el.className='save-status saving';}
  else if(s==='saved'){el.textContent='✓ 雲端已同步';el.className='save-status saved';}
  else{el.textContent='⚠ 同步失敗';el.className='save-status';}
}
function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(saveData,600);}

// ── 工具函數 ──
function fmtHM(totalMin){const m=((totalMin%1440)+1440)%1440;return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0');}
function fmtRangeTW(h){return fmtHM(h*60)+'–'+fmtHM(h*60+60);}
function fmtRangeOT(h){return fmtHM(h*60)+'–'+fmtHM(h*60+60);}
function fmtDiff(d){const s=d>=0?'+':'-';const a=Math.abs(d);return s+Math.floor(a/60)+(a%60?':'+String(a%60).padStart(2,'0'):'')+'h';}
function cellKey(h,di){return h+'_'+di;}
function isBusy(h,di){const e=schedule[cellKey(h,di)];return !!(e&&e.name);}

function getStudents(){
  const map={};
  Object.values(schedule).forEach(e=>{
    if(e&&e.name&&e.name!=='X'&&!map[e.name])map[e.name]=e.color;
  });
  return Object.fromEntries(Object.entries(map).sort((a,b)=>a[0].localeCompare(b[0])));
}

function sessionCount(name){return Object.values(schedule).filter(e=>e&&e.name===name).length;}

function incomePerDay(di){
  let t=0;
  TW_HOURS.forEach(h=>{
    const e=schedule[cellKey(h,di)];
    if(e&&e.name&&e.name!=='X')t+=(rates[e.name]||0);
  });
  return t;
}

// ── 對照時區映射 ──
function buildOTMap(){
  const otMap={};for(let di=0;di<7;di++)otMap[di]={};
  Object.entries(schedule).forEach(([key,entry])=>{
    if(!entry||!entry.name)return;
    const[h,di]=key.split('_').map(Number);
    const{di:otDi,h:otH}=twToOt(di,h);
    if(!otMap[otDi][otH])otMap[otDi][otH]=[];
    otMap[otDi][otH].push(entry);
  });
  return otMap;
}
function buildOTBusyMap(){
  const busyMap={};for(let di=0;di<7;di++)busyMap[di]={};
  Object.keys(schedule).forEach(key=>{
    const e=schedule[key];if(!e||!e.name)return;
    const[h,di]=key.split('_').map(Number);
    const{di:otDi,h:otH}=twToOt(di,h);
    busyMap[otDi][otH]=true;
  });
  return busyMap;
}

// ── TZ Select ──
function buildTZSelect(){
  const sel=document.getElementById('tz-select');let first=-1;
  TZ_LIST.forEach((t,i)=>{
    const o=document.createElement('option');o.value=i;o.textContent=t.name;
    if(t.disabled)o.disabled=true;else if(first<0)first=i;
    sel.appendChild(o);
  });
  sel.value=first;currentTZ=TZ_LIST[first];
}
function updateTZ(){
  const idx=parseInt(document.getElementById('tz-select').value);
  currentTZ=TZ_LIST[idx];diffMin=computeDiff(currentTZ.tz);
  const lbl=getTZLabel(currentTZ.tz);
  document.getElementById('diff-badge').innerHTML='台灣時間 <b>'+fmtDiff(diffMin)+'</b> = <b>'+currentTZ.name+'</b>';
  document.getElementById('other-header').textContent=currentTZ.name+'（'+lbl+'）';
  document.getElementById('free-other-header').textContent=currentTZ.name+'（'+lbl+'）';
  renderSched();
}

// ── 標頭（固定週一到週日） ──
function renderHead(tid){
  document.getElementById(tid).innerHTML=
    '<tr><th style="width:60px">時間</th>'+DAYS.map(d=>'<th>'+d+'</th>').join('')+'</tr>';
}

function renderSched(){
  ['tw-thead','ot-thead','free-tw-thead','free-ot-thead'].forEach(renderHead);
  renderTWBody('tw-tbody');
  renderOTBody('ot-tbody');
  renderFreeTWBody('free-tw-tbody');
  renderFreeOTBody('free-ot-tbody');
  renderArrows('sched-arrows',TW_HOURS.length);
  renderFreeArrows();
  renderLegend();renderIncomeTable();renderDayGrid();renderSummary();
}

// ── 台灣課表 ──
function renderTWBody(tid){
  const tbody=document.getElementById(tid);tbody.innerHTML='';
  TW_HOURS.forEach(h=>{
    const tr=document.createElement('tr');
    const td=document.createElement('td');td.className='time-col';td.textContent=fmtRangeTW(h);tr.appendChild(td);
    DAYS.forEach((_,di)=>{
      const cell=document.createElement('td');cell.className='cell';
      const key=cellKey(h,di);const entry=schedule[key];
      if(entry&&entry.name){
        if(entry.name === 'X') {
          cell.innerHTML=`<div class="chip" style="background:#f0f0f0;color:#999;border:1px dashed #ccc">
            <span class="name">❌ 不排課</span>
            <button class="del" onclick="deleteEntry(event,'${key}')">✕</button>
          </div>`;
        } else {
          const c=COLORS[entry.color]||COLORS.blue;const rv=rates[entry.name]||0;
          cell.innerHTML=`<div class="chip" style="background:${c.bg};color:${c.text}">
            <span class="name">${entry.name}</span>
            ${rv>0?'<span class="rate-tag">NT$'+rv.toLocaleString()+'</span>':''}
            <button class="del" onclick="deleteEntry(event,'${key}')">✕</button>
          </div>`;
        }
      }else{cell.innerHTML='<div class="plus">+</div>';}
      cell.onclick=()=>openModal(h,di,key);
      tr.appendChild(cell);
    });
    tbody.appendChild(tr);
  });
}

// ── 對照時區課表 ──
function renderOTBody(tid){
  const tbody=document.getElementById(tid);tbody.innerHTML='';
  const otMap=buildOTMap();
  const otHours=getOTDisplayHours();
  otHours.forEach(h=>{
    const tr=document.createElement('tr');
    const td=document.createElement('td');td.className='time-col';td.textContent=fmtRangeOT(h);tr.appendChild(td);
    DAYS.forEach((_,otDi)=>{
      const cell=document.createElement('td');cell.className='cell mirror';
      const entries=otMap[otDi]&&otMap[otDi][h]?otMap[otDi][h]:[];
      if(entries.length>0){
        const entry=entries[0];
        if(entry.name === 'X') {
          cell.innerHTML=`<div class="chip mirror-chip" style="background:#f0f0f0;color:#999;border:1px dashed #ccc">
            <span class="name">❌</span>
          </div>`;
        } else {
          const c=COLORS[entry.color]||COLORS.blue;
          cell.innerHTML=`<div class="chip mirror-chip" style="background:${c.bg};color:${c.text}">
            <span class="name">${entry.name}</span>
          </div>`;
        }
      }
      tr.appendChild(cell);
    });
    tbody.appendChild(tr);
  });
}

// ── 台灣空檔 ──
function renderFreeTWBody(tid){
  const tbody=document.getElementById(tid);tbody.innerHTML='';
  TW_HOURS.forEach(h=>{
    const tr=document.createElement('tr');
    const td=document.createElement('td');td.className='time-col';td.textContent=fmtRangeTW(h);tr.appendChild(td);
    DAYS.forEach((_,di)=>{
      const cell=document.createElement('td');cell.className='cell free-cell';

// ── 對照時區空檔 ──
function renderFreeOTBody(tid){
  const tbody=document.getElementById(tid);tbody.innerHTML='';
  const busyMap=buildOTBusyMap();
  const otHours=getOTDisplayHours();
  otHours.forEach(h=>{
    const tr=document.createElement('tr');
    const td=document.createElement('td');td.className='time-col';td.textContent=fmtRangeOT(h);tr.appendChild(td);
    DAYS.forEach((_,otDi)=>{
      const cell=document.createElement('td');cell.className='cell free-cell';
      const busy=busyMap[otDi]&&busyMap[otDi][h];

function renderArrows(id,count){
  const col=document.getElementById(id);if(!col)return;col.innerHTML='';
  for(let i=0;i<count;i++){const r=document.createElement('div');r.className='arrow-row';r.textContent='→';col.appendChild(r);}
}
function renderFreeArrows(){
  renderArrows('free-arrows',TW_HOURS.length);
}

function renderLegend(){
  const students=getStudents();const leg=document.getElementById('legend');leg.innerHTML='';
  Object.entries(students).forEach(([n,c])=>{
    const col=COLORS[c]||COLORS.blue;
    leg.innerHTML+=`<div class="leg-item"><div class="leg-dot" style="background:${col.bg};border:1px solid ${col.text}50"></div>${n}</div>`;
  });
}

function commitRate(name,val){
  rates[name]=parseInt(val)||0;
  renderTWBody('tw-tbody');renderDayGrid();renderSummary();renderIncomeTable();scheduleSave();
}

function renderIncomeTable(){
  const students=getStudents();
  Object.keys(rates).forEach(n=>{if(!students[n])delete rates[n];});
  Object.keys(students).forEach(n=>{if(rates[n]==null)rates[n]=0;});
  const tbody=document.getElementById('rate-body');const tfoot=document.getElementById('rate-foot');
  tbody.innerHTML='';let weeklyTotal=0;
  Object.entries(students).forEach(([name,color])=>{
    const c=COLORS[color]||COLORS.blue;const cnt=sessionCount(name);const rate=rates[name]||0;
    const weekly=cnt*rate;const monthly=weekly*MONTHLY_MULT;weeklyTotal+=weekly;
    const tr=document.createElement('tr');
    tr.innerHTML=`<td><span class="sdot" style="background:${c.bg};border:1px solid ${c.text}40"></span></td>
      <td>${name}</td>
      <td class="num"><input class="rate-input" type="number" min="0" step="100" value="${rate}" data-name="${name}"/></td>
      <td class="num">${cnt}</td>
      <td class="num">${weekly>0?'NT$ '+weekly.toLocaleString():'—'}</td>
      <td class="num">${monthly>0?'NT$ '+monthly.toLocaleString():'—'}</td>`;
    tbody.appendChild(tr);
  });
  const totalSessions=Object.keys(students).reduce((a,n)=>a+sessionCount(n),0);
  const monthlyTotal=weeklyTotal*MONTHLY_MULT;
  tfoot.innerHTML=`<tr><td></td><td style="font-weight:500">合計</td><td></td>
    <td class="num" style="font-weight:500">${totalSessions}</td>
    <td class="num" style="font-weight:500">${weeklyTotal>0?'NT$ '+weeklyTotal.toLocaleString():'—'}</td>
    <td class="num" style="font-weight:500">${monthlyTotal>0?'NT$ '+monthlyTotal.toLocaleString():'—'}</td></tr>`;
  document.querySelectorAll('.rate-input').forEach(inp=>{
    inp.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();inp.blur();commitRate(inp.dataset.name,inp.value);}};
    inp.onblur=()=>{commitRate(inp.dataset.name,inp.value);};
  });
}

function renderDayGrid(){
  const grid=document.getElementById('day-grid');grid.innerHTML='';
  DAYS.forEach((_,di)=>{
    const income=incomePerDay(di);
    const hrs=TW_HOURS.filter(h=>{
      const e=schedule[cellKey(h,di)];
      return e&&e.name&&e.name!=='X';
    }).length;
    const div=document.createElement('div');div.className='day-card';
    div.innerHTML=`<div class="day-name">週${DAYS[di]}</div>
      <div class="day-val">${income>0?'NT$<br>'+income.toLocaleString():'—'}</div>
      <div class="day-hrs">${hrs>0?hrs+'堂':''}</div>`;
    grid.appendChild(div);
  });
}

function renderSummary(){
  const students=getStudents();
  const weeklyTotal=Object.keys(students).reduce((s,n)=>s+sessionCount(n)*(rates[n]||0),0);
  const monthlyTotal=weeklyTotal*MONTHLY_MULT;const monthly70=Math.round(monthlyTotal*0.7);
  const totalSessions=Object.keys(students).reduce((a,n)=>a+sessionCount(n),0);
  
  const activeDays=DAYS.filter((_,di)=>TW_HOURS.some(h=>{
    const e=schedule[cellKey(h,di)];
    return e&&e.name&&e.name!=='X';
  })).length;
  
  const avg=totalSessions>0?Math.round(weeklyTotal/totalSessions):0;
  document.getElementById('summary-cards').innerHTML=`
    <div class="card"><div class="card-label">每週總收入</div><div class="card-value">${weeklyTotal>0?'NT$ '+weeklyTotal.toLocaleString():'—'}</div><div class="card-sub">${totalSessions} 堂／週</div></div>
    <div class="card"><div class="card-label">每月預估收入</div><div class="card-value">${monthlyTotal>0?'NT$ '+monthlyTotal.toLocaleString():'—'}</div><div class="card-sub">× 4 週（100%）</div></div>
    <div class="card highlight"><div class="card-label">70% 授課率預估</div><div class="card-value">${monthly70>0?'NT$ '+monthly70.toLocaleString():'—'}</div><div class="card-sub">每月預估 × 70%</div></div>
    <div class="card"><div class="card-label">平均每堂收費</div><div class="card-value">${avg>0?'NT$ '+avg.toLocaleString():'—'}</div><div class="card-sub">全體平均</div></div>
    <div class="card"><div class="card-label">授課天數</div><div class="card-value">${activeDays} 天</div><div class="card-sub">每週上課日</div></div>`;
}

// ── 匯出圖片 ──
function exportFreeImage(side){
  const isTW=(side==='tw');const lbl=isTW?'GMT+8':getTZLabel(currentTZ.tz);
  const title=isTW?'空檔時間（台灣時間 GMT+8）':'空檔時間（'+currentTZ.name+' '+lbl+'）';
  const filename=isTW?'libre_taiwan.png':'libre_'+currentTZ.name.replace(/[^a-zA-Z0-9]/g,'_')+'.png';
  const busyMap=buildOTBusyMap();
  const hours=isTW?TW_HOURS:getOTDisplayHours();
  const wrap=document.createElement('div');wrap.className='export-wrap';wrap.style.width='640px';
  const titleEl=document.createElement('div');titleEl.className='export-title';titleEl.textContent=title;wrap.appendChild(titleEl);
  const table=document.createElement('table');const thead=document.createElement('thead');
  thead.innerHTML='<tr><th style="width:80px">時間</th>'+DAYS.map(d=>'<th>'+d+'</th>').join('')+'</tr>';
  table.appendChild(thead);
  const tbody=document.createElement('tbody');
  hours.forEach(h=>{
    const tr=document.createElement('tr');
    const td=document.createElement('td');td.className='tc';td.textContent=isTW?fmtRangeTW(h):fmtRangeOT(h);tr.appendChild(td);
    DAYS.forEach((_,di)=>{
      const cell=document.createElement('td');cell.className='ec';
      const busy=isTW?isBusy(h,di):(busyMap[di]&&busyMap[di][h]);
      cell.innerHTML=busy?'<div class="export-busy"></div>':'<div class="export-libre">Libre</div>';
      tr.appendChild(cell);
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);wrap.appendChild(table);document.body.appendChild(wrap);
  html2canvas(wrap,{scale:2,backgroundColor:'#ffffff',useCORS:true}).then(canvas=>{
    document.body.removeChild(wrap);
    const link=document.createElement('a');link.download=filename;link.href=canvas.toDataURL('image/png');link.click();
  }).catch(err=>{if(document.body.contains(wrap))document.body.removeChild(wrap);alert('匯出失敗：'+err.message);});
}

// ── 分享空檔連結 ──
function showShareLink(){
  const busyMap=buildOTBusyMap();
  const otHours=getOTDisplayHours();
  const payload={
    tz:currentTZ.tz,
    tzName:currentTZ.name,
    tzLabel:getTZLabel(currentTZ.tz),
    free:[],
  };
  DAYS.forEach((_,di)=>{
    otHours.forEach(h=>{
      const busy=busyMap[di]&&busyMap[di][h];
      if(!busy) payload.free.push([di,h]);
    });
  });
  payload.hours=otHours;

  const encoded=btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
  const baseUrl=window.location.href.split('#')[0].split('?')[0];
  const shareUrl=baseUrl+'?view=free&data='+encoded;

  document.getElementById('modal-mount').innerHTML=`<div class="share-popup"><div class="share-box">
    <h3>🔗 分享空檔連結</h3>
    <p>複製以下連結給學生，他們可以直接查看你目前的空檔時間（${currentTZ.name}）。</p>
    <textarea class="share-url" readonly onclick="this.select()">${shareUrl}</textarea>
    <div class="share-btns">
      <button onclick="copyShareUrl('${shareUrl.replace(/'/g,"\\'")}')">複製連結</button>
      <button onclick="window.open('${shareUrl.replace(/'/g,"\\'")}','_blank')">預覽頁面</button>
      <button onclick="closeModal()">關閉</button>
    </div>
  </div></div>`;
}

function copyShareUrl(url){
  navigator.clipboard.writeText(url).then(()=>{
    alert('連結已複製！');
  }).catch(()=>{
    const ta=document.querySelector('.share-url');ta.select();document.execCommand('copy');
    alert('連結已複製！');
  });
}

// ── 學生檢視模式 ──
function checkViewMode(){
  const params=new URLSearchParams(window.location.search);
  if(params.get('view')==='free'){
    try{
      const raw=params.get('data');
      const payload=JSON.parse(decodeURIComponent(escape(atob(raw))));
      renderStudentView(payload);
      return true;
    }catch(e){console.error(e);}
  }
  return false;
}

function renderStudentView(payload){
  document.body.innerHTML='';
  const style=document.createElement('style');
  style.textContent=`
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:16px;background:#fff;color:#222}
    .sv-header{background:#E1F5EE;border:1px solid #9FE1CB;border-radius:10px;padding:16px 20px;margin-bottom:20px}
    .sv-header h1{font-size:16px;font-weight:700;color:#085041;margin-bottom:8px}
    .sv-header p{font-size:13px;color:#085041;line-height:1.6;margin:4px 0}
    .sv-tz{font-size:12px;color:#27500A;margin-top:8px;font-weight:500}
    .tbl-wrap{overflow-x:auto}
    table{border-collapse:collapse;font-size:11px;width:100%;min-width:480px}
    th{background:#f0f0f0;color:#444;font-weight:600;padding:5px 4px;border:1px solid #ccc;text-align:center;font-size:10px}
    td.tc{background:#f0f0f0;color:#555;font-size:10px;padding:3px 5px;border:1px solid #ccc;text-align:center;white-space:nowrap;width:70px;height:40px;vertical-align:middle}
    td.ec{border:1px solid #ccc;padding:2px;height:40px;vertical-align:middle}
    .libre{background:#FDE68A;height:100%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#111;border-radius:3px}
    .busy{background:#e8e8e8;height:100%;border-radius:3px}
  `;
  document.head.appendChild(style);

  const header=document.createElement('div');header.className='sv-header';
  header.innerHTML=`
    <h1>📅 我的空檔時間 / Mis Horarios Disponibles</h1>
    <p>這是目前我有的空檔時間，你可以依照你的空檔和我約上課時間。</p>
    <p><em>Estos son mis horarios libres actuales. Puedes contactarme según tu disponibilidad para programar una clase.</em></p>
    <div class="sv-tz">🌍 時區 / Zona horaria：${payload.tzName}（${payload.tzLabel}）</div>
  `;
  document.body.appendChild(header);

  const days=['一','二','三','四','五','六','日'];

  const table=document.createElement('table');
  const thead=document.createElement('thead');
  thead.innerHTML='<tr><th>時間</th>'+days.map(d=>'<th>週'+d+'</th>').join('')+'</tr>';
  table.appendChild(thead);
  const tbody=document.createElement('tbody');
  payload.hours.forEach(h=>{
    const tr=document.createElement('tr');
    const td=document.createElement('td');td.className='tc';
    const hh=String(h).padStart(2,'0');const hh2=String((h+1)%24).padStart(2,'0');
    td.textContent=hh+':00–'+hh2+':00';tr.appendChild(td);
    days.forEach((_,di)=>{
      const cell=document.createElement('td');cell.className='ec';
      const isFree=freeSet.has(di+'_'+h);
      cell.innerHTML=isFree?'<div class="libre">Libre</div>':'<div class="busy"></div>';
      tr.appendChild(cell);
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);wrap.appendChild(table);document.body.appendChild(wrap);
}

// ── 新增/編輯 modal ──
function openModal(h,di,key){
  currentCell={h,di,key};const e=schedule[key]||{};
  const opts=COLOR_KEYS.map(k=>`<option value="${k}"${(e.color||'blue')===k?' selected':''}>${k}</option>`).join('');
  document.getElementById('modal-mount').innerHTML=`<div class="modal-overlay"><div class="modal">
    <h3>${e.name?'編輯學生':'新增學生'}</h3>
    <label>學生姓名</label><input type="text" id="m-name" placeholder="請輸入姓名" value="${e.name||''}"/>
    <label>顏色標記</label><select id="m-color">${opts}</select>
    <div class="modal-btns"><button onclick="closeModal()">取消</button><button class="primary" onclick="saveEntry()">儲存</button></div>
  </div></div>`;
  setTimeout(()=>document.getElementById('m-name').focus(),50);
}
function closeModal(){document.getElementById('modal-mount').innerHTML='';currentCell=null;}
function saveEntry(){
  if(!currentCell)return;const name=document.getElementById('m-name').value.trim();if(!name){alert('請輸入學生姓名');return;}
  schedule[currentCell.key]={name,color:document.getElementById('m-color').value};closeModal();renderSched();scheduleSave();
}
function deleteEntry(e,key){e.stopPropagation();delete schedule[key];renderSched();scheduleSave();}
function clearAll(){if(confirm('確定要清空整張課表嗎？')){schedule={};rates={};renderSched();scheduleSave();}}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

// ── 啟動 ──
if(!checkViewMode()){
  buildTZSelect();
  updateTZ();
  listenCloudData();
}
</script>
</body>
