  try{

    };
    return Math.round((parseLS(tzStr)-parseLS(utcStr))/60000);
  }catch(e){return 0;}

  const minH=Math.min(...otHours);
  const maxH=Math.max(...otHours);

  const start=Math.max(0,minH-2);

function showShareLink(){
  // 把目前的空檔資料、時區資訊編碼進 URL
  const busyMap=buildOTBusyMap();
  const otHours=getOTDisplayHours();
  const payload={
    tz:currentTZ.tz,
    tzName:currentTZ.name,
    tzLabel:getTZLabel(currentTZ.tz),
    // 儲存對照時區的空閒格子：[di, h] 陣列
    free:[],
  };
  DAYS.forEach((_,di)=>{
    otHours.forEach(h=>{
      const busy=busyMap[di]&&busyMap[di][h];
      if(!busy) payload.free.push([di,h]);
    });
  });
  payload.hours=otHours;

  // 用 base64 編碼
  const encoded=btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
  // 建立公開頁面的 URL（同一個 HTML 但加上 #free= 參數）
  const baseUrl=window.location.href.split('#')[0].split('?')[0];
  const shareUrl=baseUrl+'?view=free&data='+encoded;

  document.getElementById('modal-mount').innerHTML=`<div class="share-popup"><div class="share-box">
    <h3>🔗 分享空檔連結</h3>
    <p>複製以下連結給學生，他們可以直接查看你目前的空檔時間（${currentTZ.name}）。</p>
    <textarea class="share-url" readonly onclick="this.select()">${shareUrl}</textarea>
    <div class="share-btns">
      <button onclick="copyShareUrl('${shareUrl.replace(/'/g,"\\'")}')">複製連結</button>
      <button onclick="window.open('${shareUrl.replace(/'/g,"\\'")}','_blank')">預覽頁面</button>
      <button onclick="closeModal()">關閉</button>
    </div>
  </div></div>`;
}

function copyShareUrl(url){
  navigator.clipboard.writeText(url).then(()=>{
    alert('連結已複製！');
  }).catch(()=>{
    // fallback
    const ta=document.querySelector('.share-url');ta.select();document.execCommand('copy');
    alert('連結已複製！');
  });
}
